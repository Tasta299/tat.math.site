          { id: "FR07", name: "Vô hiệu hoá thông tin khách hàng", desc: "Ẩn hoặc xóa thông tin khách hàng không còn hoạt động.", source: "Phòng Hành chính - Tổng hợp", priority: "Should Have", module: "Quản lý khách hàng" },
          { id: "FR08", name: "Đăng ký", desc: "If một khách hàng mới chưa có tài khoản để đăng nhập vào hệ thống thì phải thực hiện quy trình đăng ký tạo tài khoản người dùng", source: "Ban giám đốc, khách hàng", priority: "Must Have", module: "Quản lý khách hàng" },
          { id: "FR09", name: "Đăng nhập", desc: "Khách hàng và nhân viên công ty cần thực hiện thao tác đăng nhập tài khoản (đối với nhân viên, sử dụng tài khoản BecaWork liên kết nội bộ) để truy cập vào các quy trình và sử dụng tính năng.", source: "Khách hàng, Ban giám đốc", priority: "Must Have", module: "Quản lý khách hàng" },

          // Module 2: Quản lý đơn yêu cầu
          { id: "FR10", name: "Tạo đơn yêu cầu", desc: "Cho phép tạo mới đơn đơn yêu cầu cho khách hàng", source: "Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý đơn yêu cầu" },
          { id: "FR12", name: "Xem danh sách đơn đơn yêu cầu", desc: "Cho phép nội bộ công ty theo dõi danh sách đơn yêu cầu", source: "Ban giám đốc", priority: "Must Have", module: "Quản lý đơn yêu cầu" },
          { id: "FR13", name: "Xem chi tiết đơn yêu cầu", desc: "Cho phép nội bộ phân tích vụ việc", source: "Phòng Hành chính - Tổng hợp, Khách hàng", priority: "Must Have", module: "Quản lý đơn yêu cầu" },
          { id: "FR14", name: "Cập nhật đơn yêu cầu", desc: "Cho phép khách hàng chỉnh sửa thông tin cung cấp", source: "khách hàng", priority: "Must Have", module: "Quản lý đơn yêu cầu" },
          { id: "FR15", name: "Cập nhật tiến độ", desc: "Cho phép nội bộ cập nhật tiến độ công việc (mới tạo, đã tiếp nhận, đang xử lý, đang phê duyệt phương án, huỷ)", source: "Nhân viên phụ trách", priority: "Must Have", module: "Quản lý đơn yêu cầu" },
          { id: "FR16", name: "Tìm kiếm đơn yêu cầu", desc: "Cho phép tra cứu nhanh đơn đơn yêu cầu theo khách hàng hoặc nhân viên đảm nhiệm", source: "Nhân viên phụ trách, Trưởng phòng ban", priority: "Could Have", module: "Quản lý đơn yêu cầu" },
          { id: "FR17", name: "Xoá đơn yêu cầu", desc: "Cho phép khách hàng thu hồi đơn nếu đơn đang ở trạng thái “mới tạo” hoặc “đã tiếp nhận”.", source: "Phòng Hành chính - Tổng hợp, khách hàng", priority: "Could Have", module: "Quản lý đơn yêu cầu" },
          { id: "FR18", name: "Phân loại mức độ cấp bách của đơn yêu cầu", desc: "Đánh giá sơ bộ mức độ nghiêm trọng (trung bình/nghiêm trọng/thấp).", source: "Hệ thống, Phòng Hành chính - Tổng hợp", priority: "Should Have", module: "Quản lý đơn yêu cầu" },
          { id: "FR19", name: "Kết thúc vụ việc", desc: "Đóng hồ sơ khi đã đạt được thỏa thuận hoặc chuyển tòa án.", source: "Trưởng phòng ban", priority: "Should Have", module: "Quản lý đơn yêu cầu" },

          // Module 3: Quản lý loại đơn yêu cầu
          { id: "FR20", name: "Tạo danh mục loại đơn yêu cầu", desc: "Cho phép ban lãnh đạo tạo thêm loại đơn yêu cầu", source: "Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý loại đơn yêu cầu" },
          { id: "FR21", name: "Xem danh sách loại đơn yêu cầu", desc: "Cho phép nội bộ biết loại nào đang được xử lý", source: "Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý loại đơn yêu cầu" },
          { id: "FR22", name: "Phân loại đơn yêu cầu", desc: "Cho phép người dùng phân loại đơn dựa trên nội dung khách hàng nhập trong đơn.", source: "Phòng Hành chính - Tổng hợp", priority: "Should Have", module: "Quản lý loại đơn yêu cầu" },
          { id: "FR23", name: "Cập nhật danh mục", desc: "Thay đổi tên hoặc mô tả của các loại đơn.", source: "Phòng Hành chính - Tổng hợp", priority: "Should Have", module: "Quản lý loại đơn yêu cầu" },
          { id: "FR24", name: "Ẩn loại đơn yêu cầu", desc: "Tạm ẩn các danh mục không còn sử dụng.", source: "Phòng Hành chính - Tổng hợp", priority: "Should Have", module: "Quản lý loại đơn yêu cầu" },

          // Module 4: Quản lý chứng cứ tài liệu
          { id: "FR25", name: "Tải lên tài liệu minh chứng", desc: "Cho phép khách hàng tải ảnh, video, email hoặc file ghi âm liên quan đến vụ việc.", source: "Khách hàng", priority: "Must Have", module: "Quản lý chứng cứ tài liệu" },
          { id: "FR26", name: "Xem danh sách tài liệu đã đăng tải", desc: "Cho phép khách hàng và nội bộ xem lại danh sách tài liệu theo đơn đơn yêu cầu, theo khách hàng", source: "Khách hàng", priority: "Must Have", module: "Quản lý chứng cứ tài liệu" },
          { id: "FR27", name: "Xem chi tiết tài liệu", desc: "Cho phép khách hàng và nội bộ xem chi tiết tài liệu", source: "Khách hàng", priority: "Must Have", module: "Quản lý chứng cứ tài liệu" },
          { id: "FR28", name: "Lưu lịch sử đăng tải tài liệu", desc: "Cho phép nội bộ lưu trữ tất cả tài liệu của khách hàng", source: "Phòng Hành chính - Tổng hợp", priority: "Should Have", module: "Quản lý chứng cứ tài liệu" },
          { id: "FR29", name: "Cập nhật tài liệu", desc: "Cho phép khách hàng bổ sung, thay đổi tài liệu đăng tải", source: "Khách hàng", priority: "Should Have", module: "Quản lý chứng cứ tài liệu" },
          { id: "FR30", name: "Xoá tài liệu", desc: "Cho phép khách hàng xoá tài liệu mà họ không còn nhu cầu đăng tải", source: "Khách hàng", priority: "Should Have", module: "Quản lý chứng cứ tài liệu" },
          { id: "FR31", name: "Kiểm soát quyền tải tài liệu", desc: "Giới hạn nhân viên không được tải tài liệu nếu không được phép", source: "Ban giám đốc", priority: "Should Have", module: "Quản lý chứng cứ tài liệu" },
          { id: "FR32", name: "Tự động sao lưu", desc: "Hệ thống sao lưu định kỳ toàn bộ hồ sơ khiếu nại", source: "Hệ thống, Phòng Hành chính - Tổng hợp", priority: "Should Have", module: "Quản lý chứng cứ tài liệu" },

          // Module 5: Quản lý nhân viên
          { id: "FR33", name: "Thêm nhân viên", desc: "Tạo hồ sơ nhân viên", source: "Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý nhân viên" },
          { id: "FR34", name: "Xem danh sách nhân viên", desc: "Cho phép xem danh sách nhân viên", source: "Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý nhân viên" },
          { id: "FR35", name: "Xem chi tiết thông tin nhân viên", desc: "Cho phép xem thông tin chi tiết của nhân viên (phòng ban, vị trí, chức vụ,...)", source: "Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý nhân viên" },
          { id: "FR36", name: "Xem nhân viên phụ trách", desc: "Cho phép xem được vụ việc đơn yêu cầu đó do nhân viên nào phụ trách", source: "Phòng Hành chính - Tổng hợp", priority: "Should Have", module: "Quản lý nhân viên" },
          { id: "FR37", name: "Tìm kiếm nhanh nhân viên phụ trách", desc: "Tìm nhanh nhân viên đang phụ trách một hồ sơ đơn yêu cầu cụ thể (theo tên, phòng ban).", source: "Trưởng phòng ban", priority: "Could Have", module: "Quản lý nhân viên" },
          { id: "FR38", name: "Cập nhật thông tin nhân viên", desc: "Chỉnh sửa chức vụ, phòng ban, thông tin liên hệ của nhân viên.", source: "Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý nhân viên" },
          { id: "FR39", name: "Khoá tài khoản nhân viên", desc: "Lưu trữ và khoá tài khoản nhân viên khi đã thôi việc", source: "Phòng Hành chính - Tổng hợp", priority: "Could Have", module: "Quản lý nhân viên" },
          { id: "FR40", name: "Xoá tài khoản nhân viên", desc: "Xóa tài khoản nhân viên khỏi hệ thống.", source: "Phòng IT", priority: "Must Have", module: "Quản lý nhân viên" },

          // Module 6: Quản lý phòng ban
          { id: "FR41", name: "Thêm phòng ban", desc: "Cho phép người dùng tạo thêm phòng ban", source: "Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý phòng ban" },
          { id: "FR42", name: "Xem danh sách phòng ban", desc: "Cho phép người dùng xem danh sách tất cả phòng ban (đang hoạt động hoặc đã ẩn) với các cột: tên phòng ban, cơ sở, số nhân viên, trạng thái)", source: "Trưởng phòng ban", priority: "Must Have", module: "Quản lý phòng ban" },
          { id: "FR43", name: "Xem chi tiết phòng ban", desc: "Cho phép người dùng xem chi tiết một phòng ban, bao gồm: thông tin chung, danh sách nhân viên, trưởng phòng, cơ sở, các đơn khiếu nại đang xử lý, và các thông tin thống kê liên quan.", source: "Trưởng phòng ban", priority: "Must Have", module: "Quản lý phòng ban" },
          { id: "FR44", name: "Cập nhật thay đổi nhân sự", desc: "Khi nhân viên chuyển phòng ban, hệ thống sẽ đóng quyền xử lý của nhân viên đó đối với các đơn thuộc phòng ban cũ, đồng thời lưu lại thông tin phòng ban cũ vào lịch sử xử lý đơn.", source: "Trưởng phòng ban, Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý phòng ban" },
          { id: "FR45", name: "Tìm kiếm phòng ban", desc: "Cho phép TQC tìm kiếm phòng ban theo: tên, cơ sở, trạng thái", source: "Trưởng phòng ban", priority: "Could Have", module: "Quản lý phòng ban" },
          { id: "FR46", name: "Gán trưởng phòng ban", desc: "Cho phép chọn một nhân viên là trưởng phòng cho một phòng ban, có thể ghi nhận ngày bắt đầu nhiệm kỳ, ngày kết thúc (nếu có), và người kế nhiệm (nếu có)", source: "Ban giám đốc, phòng Hành chính - Tổng hợp", priority: "Could Have", module: "Quản lý phòng ban" },
          { id: "FR47", name: "Xem lịch sử thay đổi của phòng ban", desc: "Lưu và cho phép xem lịch sử các thay đổi liên quan đến phòng ban: thêm, sửa, ẩn, đổi trưởng phòng, gán nhiệm vụ, theo người thực hiện, ngày giờ, và mô tả thay đổi.", source: "Phòng Hành chính - Tổng hợp", priority: "Should Have", module: "Quản lý phòng ban" },

          // Module 7: Quản lý phương án
          { id: "FR48", name: "Tạo phương án xử lý", desc: "Cho phép nhân viên phụ trách tạo một phương án xử lý mới, bao gồm: mã phương án, nội dung chi tiết, thời hạn áp dụng (nếu có)", source: "Trưởng phòng ban", priority: "Must Have", module: "Quản lý phương án" },
          { id: "FR49", name: "Xem chi tiết phương án", desc: "Cho phép xem chi tiết một phương án, bao gồm: nội dung chi tiết, template văn bản, điều kiện áp dụng, chi phí đề xuất và các đơn yêu cầu đã từng áp dụng phương án này.", source: "Trưởng phòng ban, nhân viên phụ trách", priority: "Must Have", module: "Quản lý phương án" },
          { id: "FR50", name: "Lưu trữ phương án", desc: "Khi phương án được phê duyệt và đơn kết thúc, hệ thống lưu lại phương án đã được áp dụng cho từng loại đơn yêu cầu, kèm theo người xác nhận, thời gian, nội dung chỉnh sửa, và đánh dấu rằng phương án này đã được dùng cho đơn này, phục vụ thống kê và tham khảo", source: "Phòng Hành chính - Tổng hợp, trưởng phòng ban", priority: "Should Have", module: "Quản lý phương án" },
          { id: "FR51", name: "Tìm kiếm phương án", desc: "Cho phép người dùng xem lại các phương án giải quyết cho từng loại đơn yêu cầu, từng đơn yêu cầu. Nhân viên phụ trách có thể xem để tham khảo cách xử lý một cách công khai", source: "Nhân viên phụ trách, Trưởng phòng ban", priority: "Could Have", module: "Quản lý phương án" },

          // Module 8: Quản lý phản hồi
          { id: "FR52", name: "Tạo phản hồi", desc: "Cho phép nhân viên phụ trách tạo một phản hồi cho một đơn yêu cầu, nội dung bao gồm: hình thức trao đổi, khung nhập nội dung được phê duyệt, lưu trữ sau khi đã gửi.", source: "Nhân viên phụ trách, Trưởng phòng ban", priority: "Must Have", module: "Quản lý phản hồi" },
          { id: "FR53", name: "Xem phản hồi", desc: "Hiển thị danh sách các phản hồi đã được tạo/gửi, bao gồm: đơn yêu cầu, khách hàng, ngày gửi, người gửi, trạng thái (đã gửi/chưa gửi).", source: "Nhân viên phụ trách, Trưởng phòng ban", priority: "Must Have", module: "Quản lý phản hồi" },
          { id: "FR54", name: "Xem chi tiết một phản hồi", desc: "Cho phép xem toàn bộ nội dung phản hồi, bao gồm: nội dung văn bản, phương án, người gửi, ngày giờ gửi và trạng thái (đã gửi, chưa gửi)", source: "nhân viên phụ trách, Trưởng phòng ban", priority: "Must Have", module: "Quản lý phản hồi" },
          { id: "FR55", name: "Tìm kiếm phản hồi", desc: "Cho phép tìm kiếm phản hồi theo: mã đơn, mã khách hàng, nội dung, người gửi, ngày gửi.", source: "Nhân viên phụ trách, Trưởng phòng ban", priority: "Could Have", module: "Quản lý phản hồi" },
          { id: "FR56", name: "Xem lịch sử phản hồi", desc: "Hiển thị tất cả các phản hồi (của nhân viên và của khách hàng) được tạo cho một đơn theo thứ tự thời gian", source: "Nhân viên phụ trách, Trưởng phòng ban", priority: "Should Have", module: "Quản lý phản hồi" },
          { id: "FR57", name: "Gửi thông báo trạng thái phản hồi", desc: "Hệ thống tự động gửi thông báo cho khách hàng khi phản hồi được gửi 48h", source: "Nhân viên phụ trách, Trưởng phòng ban", priority: "Should Have", module: "Quản lý phản hồi" },

          // Module 9: Quản lý phê duyệt
          { id: "FR58", name: "Tạo yêu cầu phê duyệt", desc: "Cho phép trưởng phòng ban tạo một yêu cầu phê duyệt cho một phương án, bao gồm: chọn nội dung cần phê duyệt (phương án, phân công bởi nhân viên phụ trách), gửi cho Ban giám đốc, mô tả hạn xử lý và mô tả lý do cần phê duyệt.", source: "Trưởng phòng ban, Ban giám đốc", priority: "Must Have", module: "Quản lý phê duyệt" },
          { id: "FR59", name: "Xem danh sách yêu cầu", desc: "Hiển thị danh sách các yêu cầu phê duyệt đang chờ, bao gồm: đơn, người tạo, nội dung tóm tắt, thời hạn, trạng thái (đang chờ, quá hạn, đã xử lý).", source: "Ban giám đốc, Trưởng phòng ban", priority: "Must Have", module: "Quản lý phê duyệt" },
          { id: "FR60", name: "Xem chi tiết yêu cầu", desc: "Cho phép người dùng xem toàn bộ thông tin chi tiết yêu cầu phê duyệt ( nhân viên phụ trách, trưởng phòng ban hướng dẫn, mô tả đơn yêu cầu của khách hàng, nội dung phương án)", source: "Trưởng phòng ban, Ban giám đốc", priority: "Must Have", module: "Quản lý phê duyệt" },
          { id: "FR61", name: "Xác nhận duyệt phương án", desc: "Cấp quản lý thực hiện phê duyệt phương án đã đề xuất và cập nhật trạng thái kết quả chính thức.", source: "Ban giám đốc", priority: "Must Have", module: "Quản lý phê duyệt" },
          { id: "FR62", name: "Từ chối yêu cầu phê duyệt", desc: "Cho phép Ban giám đốc từ chối yêu cầu phê duyệt.", source: "Ban giám đốc", priority: "Must Have", module: "Quản lý phê duyệt" },
          { id: "FR63", name: "Xóa yêu cầu phê duyệt", desc: "Cho phép người dùng gỡ bỏ yêu cầu phê duyệt kèm lý do để", source: "Nhân viên phụ trách, Trưởng phòng ban", priority: "Should Have", module: "Quản lý phê duyệt" },

          // Module 10: Quản lý hồ sơ lưu trữ
          { id: "FR64", name: "Tạo hồ sơ lưu trữ", desc: "Sau khi đơn khiếu nại được đóng ở Bước 4, hệ thống sẽ tự động cập nhật trạng thái đơn thành Đã đóng - Lưu trữ, đồng thời kích hoạt các ràng buộc bảo mật lưu trữ (khóa chức năng chỉnh sửa đơn, bắt đầu tính thời gian hết hạn lưu trữ 2 năm, kích hoạt audit log cho mọi lượt xem", source: "Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý hồ sơ lưu trữ" },
          { id: "FR65", name: "Xem danh sách hồ sơ", desc: "Cho phép người dùng xem danh sách các hồ sơ lưu trữ, bao gồm: mã đơn, tên khách hàng, loại yêu cầu, nhân viên phụ trách, phòng ban, ngày kết thúc, ngày hết hạn lưu trữ, còn bao nhiêu ngày hết, và trạng thái lưu trữ.", source: "Ban giám đốc, Phòng Hành chính - Tổng hợp", priority: "Must Have", module: "Quản lý hồ sơ lưu trữ" },

                const doc = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                setPdfDoc(doc);

                            : "text-slate-600 hover:text-slate-900 hover:bg-slate-50"
                        }`}
                      >
                        Usecase tổng quát
                      </button>
                      {USECASE_DETAILS.map(uc => {
                        const isActive = ucSubTab === uc.id;
                        return (
                          <button
                            key={uc.id}
                            onClick={() => setUcSubTab(uc.id)}
                            className={`px-3 py-2.5 rounded-xl text-xs font-bold transition-all shrink-0 ${
                              isActive
                                ? "bg-indigo-600 text-white shadow-sm"
                                : "text-slate-600 hover:text-slate-900 hover:bg-slate-50"
                            }`}
                          >
                            {uc.id}
                          </button>
                        );
                      })}
                    </div>

                    {/* Usecase tổng quát */}
                    {ucSubTab === "general" && (
                      <div className="space-y-6">
                        <div className="pb-2 border-b border-slate-100">
                          <h2 className="text-2xl font-bold text-slate-900">Sơ đồ Usecase tổng quát (Trang 34)</h2>
                        </div>
                        
                        <PdfRenderer 
                          pdfDoc={pdfDoc} 
                          pageNum={PDF_MAP.usecaseGeneral + pdfPageOffsets.usecaseGeneral} 
                          pdfLoading={pdfLoading}
                          pdfError={pdfError}
                          fallbackType="usecaseGeneral"
                          label="Usecase Tổng Quát"
                        />
                      </div>
                    )}

                    {/* UC1 - UC10 Detailed specs */}
                    {ucSubTab !== "general" && (
                      <div className="space-y-8">
                        {(() => {
                          const uc = USECASE_DETAILS.find(item => item.id === ucSubTab);
                          if (!uc) return <p className="text-slate-500 text-center font-semibold">Không tìm thấy đặc tả usecase.</p>;
                          
                          return (
                            <div className="space-y-8">
                              <div className="pb-4 border-b border-slate-200">
                                <div className="flex items-center space-x-2">
                                  <span className="bg-indigo-600 text-white text-xs font-black font-mono px-2.5 py-1 rounded">
                                    {uc.id}
                                  </span>
                                  <h2 className="text-2xl font-bold text-slate-900">{uc.title}</h2>
                                </div>
                                <p className="text-sm text-slate-600 mt-2 italic font-semibold">Mô tả đặc tả: {uc.desc}</p>
                              </div>

                              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                                
                                {/* Trực quan hóa sơ đồ */}
                                <div className="space-y-4">
                                  <h3 className="text-lg font-bold text-slate-900">
                                    <span>Sơ đồ phân rã {uc.id} (Trang {uc.pdfPage})</span>
                                  </h3>
                                  <PdfRenderer 
                                    pdfDoc={pdfDoc} 
                                    pageNum={uc.pdfPage + pdfPageOffsets.ucStart} 
                                    pdfLoading={pdfLoading}
                                    pdfError={pdfError}
                                    fallbackType="usecaseGeneral"
                                    label={`Sơ đồ phân rã ${uc.id}`}
                                  />
                                </div>

                                {/* Bảng đặc tả chi tiết */}
                                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden divide-y divide-slate-100">
                                  <div className="p-4 grid grid-cols-3 gap-2 text-sm">
                                    <span className="font-bold text-slate-500">Tác nhân chính</span>
                                    <span className="col-span-2 font-semibold text-slate-900">{uc.actor}</span>
                                  </div>

                                  <div className="p-4 grid grid-cols-3 gap-2 text-sm">
                                    <span className="font-bold text-slate-500">Tiền điều kiện</span>
                                    <span className="col-span-2 text-slate-700 font-semibold">{uc.preCond}</span>
                                  </div>

                                  <div className="p-4 grid grid-cols-3 gap-2 text-sm">
                                    <span className="font-bold text-slate-500">Hậu điều kiện</span>
                                    <span className="col-span-2 text-slate-700 font-semibold">{uc.postCond}</span>
                                  </div>

                                  <div className="p-4 flex flex-col space-y-2 text-sm">
                                    <span className="font-bold text-slate-500 block">Luồng sự kiện chính (Main Flow)</span>
                                    <ol className="list-decimal pl-5 space-y-1 text-slate-700 font-semibold">
                                      {uc.mainFlow.map((step, idx) => (
                                        <li key={idx}>{step}</li>
                                      ))}
                                    </ol>
                                  </div>

                                  <div className="p-4 flex flex-col space-y-2 text-sm">
                                    <span className="font-bold text-slate-500 block">Luồng ngoại lệ / thay thế</span>
                                    <ul className="list-disc pl-5 space-y-1 text-slate-700 font-semibold text-justify">
                                      {uc.altFlow.map((step, idx) => (
                                        <li key={idx} className={step.includes("Không có thông tin") ? "text-slate-400 italic font-normal" : "text-amber-700"}>{step}</li>
                                      ))}
                                    </ul>
                                  </div>
                                </div>

                              </div>
                            </div>
                          );
                        })()}
                      </div>
                    )}

                  </div>
                )}

                {/* TAB 6: BPMN */}
                {activeTab === "bpmn" && (
                  <div className="space-y-8 animate-fadeIn">
                    <div className="pb-4 border-b border-slate-200">
                      <h1 className="text-3xl font-extrabold text-slate-900">Quy trình nghiệp vụ BPMN</h1>
                      <p className="text-sm text-slate-500 mt-1 font-semibold">Sơ đồ biểu diễn luồng công việc phối hợp đa phòng ban của TQC Global (Trang 28–33).</p>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                      
                      {/* Main Process */}
                      <div className="space-y-4">
                        <div className="p-3 bg-indigo-50 border border-indigo-100 rounded-xl">
                          <h3 className="font-extrabold text-indigo-900 text-base">BPMN Main Process (Trang 28)</h3>
                        </div>
                        <PdfRenderer 
                          pdfDoc={pdfDoc} 
                          pageNum={PDF_MAP.bpmnMain + pdfPageOffsets.bpmnMain} 
                          pdfLoading={pdfLoading}
                          pdfError={pdfError}
                          fallbackType="bpmn"
                          label="BPMN Main Process"
                        />
                      </div>

                      {/* Sub Process Selector */}
                      <div className="space-y-4">
                        <div className="p-3 bg-indigo-50 border border-indigo-100 rounded-xl flex flex-col space-y-2">
                          <h3 className="font-extrabold text-indigo-900 text-base">Xem chi tiết các Quy trình con (Sub-Processes)</h3>
                          
                          <div className="flex flex-col gap-1.5 pt-1">
                            {BPMN_SUB_PROCESSES.map(sub => {
                              const isSelected = selectedSubBPMN === sub.id;
                              return (
                                <button
                                  key={sub.id}
                                  onClick={() => setSelectedSubBPMN(sub.id)}
                                  className={`px-3 py-1.5 rounded-lg text-left text-xs font-bold border transition ${
                                    isSelected
                                      ? "bg-indigo-600 text-white border-indigo-600 shadow-sm"
                                      : "bg-white text-slate-700 border-slate-200 hover:bg-slate-100"
                                  }`}
                                >
                                  {sub.name} (Trang {sub.page})
                                </button>
                              );
                            })}
                          </div>
                        </div>

                        {(() => {
                          const activeSub = BPMN_SUB_PROCESSES.find(s => s.id === selectedSubBPMN) || BPMN_SUB_PROCESSES[0];
                          return (
                            <PdfRenderer 
                              pdfDoc={pdfDoc} 
                              pageNum={activeSub.page + pdfPageOffsets.bpmnSub} 
                              pdfLoading={pdfLoading}
                              pdfError={pdfError}
                              fallbackType="bpmn"
                              label={activeSub.name}
                            />
                          );
                        })()}
                      </div>

                    </div>
                  </div>
                )}

                {/* TAB 7: ERD & CLASS DIAGRAM */}
                {activeTab === "erd" && (
                  <div className="space-y-6 animate-fadeIn">
                    <div className="pb-4 border-b border-slate-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                      <div>
                        <h1 className="text-3xl font-extrabold text-slate-900">Mô hình hóa dữ liệu</h1>
                        <p className="text-sm text-slate-500 mt-1 font-semibold">Thiết kế cấu trúc bảng quan hệ (ERD) và sơ đồ lớp (Class Diagram) phục vụ phát triển hệ thống.</p>
                      </div>

                      <div className="bg-slate-200 p-1 rounded-xl flex space-x-1 self-start sm:self-center">
                        <button
                          onClick={() => setSelectedDataDiagram("erd")}
                          className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${
                            selectedDataDiagram === "erd"
                              ? "bg-white text-indigo-700 shadow-sm"
                              : "text-slate-600 hover:text-slate-950"
                          }`}
                        >
                          Sơ đồ ERD (Trang 63)
                        </button>
                        <button
                          onClick={() => setSelectedDataDiagram("class")}
                          className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${
                            selectedDataDiagram === "class"
                              ? "bg-white text-indigo-700 shadow-sm"
                              : "text-slate-600 hover:text-slate-950"
                          }`}
                        >
                          Sơ đồ lớp (Class Diagram - Trang 64)
                        </button>
                      </div>
                    </div>

                    {selectedDataDiagram === "erd" ? (
                      <div className="space-y-4">
                        <div className="p-3 bg-indigo-50 border border-indigo-100 rounded-xl">
                          <h3 className="font-extrabold text-indigo-900 text-sm">Sơ đồ quan hệ thực thể (ERD) - Trang 63</h3>
                        </div>
                        <PdfRenderer 
                          pdfDoc={pdfDoc} 
                          pageNum={PDF_MAP.erd + pdfPageOffsets.erd} 
                          pdfLoading={pdfLoading}
                          pdfError={pdfError}
                          label="Sơ đồ ERD gốc"
                        />
                      </div>
                    ) : (
                      <div className="space-y-4">
                        <div className="p-3 bg-indigo-50 border border-indigo-100 rounded-xl">
                          <h3 className="font-extrabold text-indigo-900 text-sm">Sơ đồ lớp (Class Diagram) - Trang 64</h3>
                        </div>
                        <PdfRenderer 
                          pdfDoc={pdfDoc} 
                          pageNum={PDF_MAP.classDiagram + pdfPageOffsets.classDiagram} 
                          pdfLoading={pdfLoading}
                          pdfError={pdfError}
                          label="Sơ đồ Lớp (Class Diagram) gốc"
                        />
                      </div>
                    )}
                  </div>
                )}

              </main>

              {/* Footer */}
              <footer className="bg-slate-900 text-slate-400 py-8 border-t border-slate-800 text-xs text-center mt-12 space-y-2">
                <p className="font-bold text-white text-sm">Hệ thống thuyết trình & nghiệm thu đặc tả dự án - TQC Global</p>
                <p>Bản quyền thuộc về {THONG_TIN_DE_TAI.nhom} - Giảng viên hướng dẫn: {THONG_TIN_DE_TAI.giangVien}</p>
                <p className="text-slate-500">Mọi dữ liệu trên website cam kết 100% trung thực và đối sánh nguyên mẫu với tài liệu thuyết trình.</p>
              </footer>

            </div>
          );
        }

        // --- COMPONENT TRÌNH RENDER PDF & ĐỒNG THỜI HỖ TRỢ HIỂN THỊ HÌNH HOẠ VECTOR CHẤT LƯỢNG CAO ---
        function PdfRenderer({ pdfDoc, pageNum, pdfLoading, pdfError, fallbackType, label }) {
          const canvasRef = useRef(null);
          const [renderLoading, setRenderLoading] = useState(false);
          const [pageError, setPageError] = useState(false);
          const [zoom, setZoom] = useState(1.0);

          useEffect(() => {
            if (!pdfDoc) return;
            let renderTask = null;
            
            const renderPage = async () => {
              try {
                setRenderLoading(true);
                setPageError(false);
                const page = await pdfDoc.getPage(pageNum);
                
                const containerWidth = canvasRef.current?.parentNode?.parentNode?.clientWidth || 800;
                const standardViewport = page.getViewport({ scale: 1.0 });
                
                const baseScale = (containerWidth - 32) / standardViewport.width;
                const finalScale = baseScale * zoom;
                
                const viewport = page.getViewport({ scale: finalScale });
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                  canvasContext: context,
                  viewport: viewport
                };
                renderTask = page.render(renderContext);
                await renderTask.promise;
              } catch (err) {
                console.error("PDF page render error: ", err);
                setPageError(true);
              } finally {
                setRenderLoading(false);
              }
            };

            renderPage();

            const handleResize = () => {
              renderPage();
            };
            window.addEventListener('resize', handleResize);

            return () => {
              if (renderTask) {
                renderTask.cancel();
              }
              window.removeEventListener('resize', handleResize);
            };
          }, [pdfDoc, pageNum, zoom]);

          const handleZoomIn = () => {
            setZoom(prev => Math.min(prev + 0.15, 3.5));
          };

          const handleZoomOut = () => {
            setZoom(prev => Math.max(prev - 0.15, 0.5));
          };

          const handleZoomReset = () => {
            setZoom(1.0);
          };

          const isLoading = pdfLoading || renderLoading;

          return (
            <div className="relative border border-slate-200 rounded-2xl overflow-hidden bg-slate-100 flex flex-col shadow-sm">
              
              {/* THANH ĐIỀU KHIỂN THU PHÓNG THÔNG MINH */}
              {pdfDoc && (
                <div className="bg-white border-b border-slate-200 px-4 py-2.5 flex flex-wrap items-center justify-between gap-3 text-xs z-10">
                  <div className="flex items-center space-x-2">
                    <span className="font-semibold text-slate-500">Tỉ lệ hiển thị PDF:</span>
                    <span className="bg-indigo-50 text-indigo-700 px-2.5 py-1 rounded-md font-bold font-mono border border-indigo-100 min-w-[55px] text-center">
                      {Math.round(zoom * 100)}%
                    </span>
                  </div>
                  
                  <div className="flex items-center space-x-1.5">
                    <button
                      onClick={handleZoomOut}
                      className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold p-1.5 rounded-lg border border-slate-200 transition"
                    >
                      -
                    </button>
                    <button
                      onClick={handleZoomReset}
                      className="bg-slate-100 hover:bg-indigo-600 text-slate-700 hover:text-white font-bold px-3 py-1.5 rounded-lg border border-slate-200 hover:border-indigo-600 transition-all shadow-sm font-semibold"
                    >
                      Đặt lại
                    </button>
                    <button
                      onClick={handleZoomIn}
                      className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold p-1.5 rounded-lg border border-slate-200 transition"
                    >
                      +
                    </button>
                  </div>
                </div>
              )}

              {/* KHUNG HIỂN THỊ CHÍNH */}
              <div className="p-4 flex flex-col items-center justify-center min-h-[300px] sm:min-h-[450px] bg-slate-50/50 overflow-auto max-w-full">
                
                {/* Khi không có PDF -> Hiển thị Sơ đồ Vector tương tác nội bộ rất chuyên nghiệp */}
                {!pdfDoc && !isLoading && (
                  <div className="w-full space-y-4">
                    <div className="flex items-center justify-between bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-800">
                      <span>💡 Đang hiển thị bản vẽ tương tác mặc định. Nhấp nút <b>"Tải PDF của nhóm"</b> ở góc phải trên để xem chính xác trang vẽ thực tế.</span>
                      <span className="font-mono bg-amber-100 px-2 py-0.5 rounded">Mục tiêu: Trang {pageNum}</span>
                    </div>
                    
                    <SvgVisualizer type={fallbackType} />
                  </div>
                )}

                {isLoading && (
                  <div className="absolute inset-0 bg-slate-50/90 backdrop-blur-sm flex flex-col items-center justify-center z-10 space-y-3">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                    <span className="text-xs text-slate-600 font-bold">Đang tải trang {pageNum} của tài liệu...</span>
                  </div>
                )}

                {pdfDoc && !pageError && (
                  <div className="max-w-full flex justify-center bg-white p-2 rounded-xl border border-slate-200/80 shadow-md overflow-x-auto">
                    <canvas ref={canvasRef} className="max-w-full h-auto transition-all" />
                  </div>
                )}

                {pageError && (
                  <div className="text-center p-6 text-red-600 space-y-2">
                    <span className="text-2xl">⚠️</span>
                    <p className="text-xs font-bold">Lỗi không thể kết xuất trang {pageNum} trong tài liệu này.</p>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
