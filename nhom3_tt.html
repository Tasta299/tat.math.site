          { id: "FR20", name: "Chuyển đơn khiếu nại đến bộ phận nghiệp vụ", desc: "Trưởng phòng tiếp nhận chuyển đơn đã duyệt sang phòng ban nghiệp vụ chịu trách nhiệm chính.", source: "Tài liệu nghiệp vụ TQC - Mục 4.5.1", priority: "High", module: "Quản lý phân công" },
          { id: "FR21", name: "Chỉ định nhân viên xử lý cụ thể", desc: "Trưởng phòng nghiệp vụ gán đơn khiếu nại cho một nhân viên cụ thể trực thuộc phòng ban của mình.", source: "Tài liệu nghiệp vụ TQC - Mục 4.5.1", priority: "High", module: "Quản lý phân công" },
          { id: "FR22", name: "Thiết lập thời hạn (Deadline) xử lý", desc: "Trưởng phòng thiết lập thời gian tối đa để nhân viên hoàn thành việc đề xuất phương án khắc phục.", source: "Tài liệu nghiệp vụ TQC - Mục 4.5.2", priority: "High", module: "Quản lý phân công" },
          { id: "FR23", name: "Cảnh báo đơn xử lý quá hạn", desc: "Hệ thống tự động gửi cảnh báo qua email và thông báo đẩy khi đơn sắp hoặc đã quá hạn xử lý.", source: "Tài liệu nghiệp vụ TQC - Mục 4.5.3", priority: "Medium", module: "Quản lý phân công" },
          { id: "FR24", name: "Tái phân công nhân viên xử lý đơn", desc: "Cho phép trưởng phòng gán lại đơn khiếu nại cho nhân viên khác nếu người xử lý trước đó vắng mặt hoặc không đạt yêu cầu.", source: "Tài liệu nghiệp vụ TQC - Mục 4.5.4", priority: "Medium", module: "Quản lý phân công" },

          // FR25 - FR32: Quản lý phương án
          { id: "FR25", name: "Khởi tạo tờ trình phương án khắc phục", desc: "Nhân viên xử lý lập phương án giải quyết cụ thể sau khi đã khảo sát nguyên nhân sự việc.", source: "Tài liệu nghiệp vụ TQC - Mục 4.6.1", priority: "High", module: "Quản lý phương án" },
          { id: "FR26", name: "Mô tả nguyên nhân gốc rễ của khiếu nại", desc: "Nhân viên phân tích sâu lý do gây ra lỗi dịch vụ và nhập dữ liệu nguyên nhân vào tờ trình.", source: "Tài liệu nghiệp vụ TQC - Mục 4.6.1", priority: "Medium", module: "Quản lý phương án" },
          { id: "FR27", name: "Đề xuất giải pháp khắc phục triệt để", desc: "Mô tả các hành động cụ thể cần thực hiện để sửa đổi lỗi và đền bù cho khách hàng.", source: "Tài liệu nghiệp vụ TQC - Mục 4.6.2", priority: "High", module: "Quản lý phương án" },
          { id: "FR28", name: "Dự toán chi phí xử lý khiếu nại", desc: "Khai báo các chi phí phát sinh liên quan đến đền bù, kiểm nghiệm lại hoặc hoàn trả phí cho khách hàng.", source: "Tài liệu nghiệp vụ TQC - Mục 4.6.3", priority: "Medium", module: "Quản lý phương án" },
          { id: "FR29", name: "Đánh giá rủi ro của phương án đề xuất", desc: "Nêu các rủi ro có thể phát sinh khi thực hiện phương án khắc phục và cách phòng tránh.", source: "Tài liệu nghiệp vụ TQC - Mục 4.6.3", priority: "Low", module: "Quản lý phương án" },
          { id: "FR30", name: "Đính kèm biên bản điều tra kỹ thuật", desc: "Tải lên các tài liệu, kết quả phân tích nội bộ để làm căn cứ vững chắc cho phương án.", source: "Tài liệu nghiệp vụ TQC - Mục 4.6.4", priority: "Medium", module: "Quản lý phương án" },
          { id: "FR31", name: "Cập nhật nội dung dự thảo phương án", desc: "Nhân viên xử lý điều chỉnh lại các chi tiết trong phương án khi chưa gửi phê duyệt chính thức.", source: "Tài liệu nghiệp vụ TQC - Mục 4.6.5", priority: "Medium", module: "Quản lý phương án" },
          { id: "FR32", name: "Gửi yêu cầu phê duyệt phương án", desc: "Chuyển phương án lên trạng thái 'Chờ phê duyệt' để gửi tới Trưởng phòng ban nghiệp vụ.", source: "Tài liệu nghiệp vụ TQC - Mục 4.6.5", priority: "High", module: "Quản lý phương án" },

          // FR33 - FR40: Quản lý phản hồi
          { id: "FR33", name: "Soạn thảo văn bản phản hồi khách hàng", desc: "Tạo biểu mẫu thư phản hồi chính thức dựa trên phương án khắc phục đã được phê duyệt.", source: "Tài liệu nghiệp vụ TQC - Mục 4.7.1", priority: "High", module: "Quản lý phản hồi" },
          { id: "FR34", name: "Tự động gửi email phản hồi chính thức", desc: "Hệ thống tự động gửi thư kèm biên bản xử lý đóng dấu của trung tâm tới hòm thư khách hàng.", source: "Tài liệu nghiệp vụ TQC - Mục 4.7.1", priority: "High", module: "Quản lý phản hồi" },
          { id: "FR35", name: "Thu thập đánh giá mức độ hài lòng", desc: "Hệ thống gửi kèm link khảo sát độ hài lòng của khách hàng (thang điểm 5 sao và ý kiến góp ý).", source: "Tài liệu nghiệp vụ TQC - Mục 4.7.2", priority: "Medium", module: "Quản lý phản hồi" },
          { id: "FR36", name: "Ghi nhận phản hồi bổ sung của khách hàng", desc: "Cho phép khách hàng phản hồi ngược lại nếu họ chưa đồng ý hoàn toàn với giải pháp khắc phục.", source: "Tài liệu nghiệp vụ TQC - Mục 4.7.2", priority: "High", module: "Quản lý phản hồi" },
          { id: "FR37", name: "Tự động chuyển trạng thái đơn sang 'Đã đóng'", desc: "Hệ thống đóng khiếu nại khi khách hàng chọn đồng ý hoặc không có phản hồi thêm sau 7 ngày.", source: "Tài liệu nghiệp vụ TQC - Mục 4.7.3", priority: "Medium", module: "Quản lý phản hồi" },
          { id: "FR38", name: "Gửi tin nhắn SMS thông báo trạng thái", desc: "Gửi tin nhắn SMS ngắn thông báo cho khách hàng khi đơn khiếu nại của họ đã được giải quyết xong.", source: "Tài liệu nghiệp vụ TQC - Mục 4.7.4", priority: "Low", module: "Quản lý phản hồi" },
          { id: "FR39", name: "Lưu giữ vết giao tiếp trao đổi", desc: "Ghi nhận lịch sử toàn bộ các email, tin nhắn, cuộc gọi trao đổi giữa nhân viên và khách hàng trên đơn.", source: "Tài liệu nghiệp vụ TQC - Mục 4.7.5", priority: "Medium", module: "Quản lý phản hồi" },
          { id: "FR40", name: "Tự động nhắc nhở khách hàng đánh giá", desc: "Gửi email nhắc nhở lịch sự sau 3 ngày kể từ khi gửi phương án phản hồi nếu khách hàng chưa đánh giá.", source: "Tài liệu nghiệp vụ TQC - Mục 4.7.5", priority: "Low", module: "Quản lý phản hồi" },

          // FR41 - FR47: Quản lý phê duyệt
          { id: "FR41", name: "Hiển thị danh sách yêu cầu chờ duyệt", desc: "Giao diện riêng biệt cho quản lý xem các phương án cần được phê duyệt khẩn cấp.", source: "Tài liệu nghiệp vụ TQC - Mục 4.8.1", priority: "High", module: "Quản lý phê duyệt" },
          { id: "FR42", name: "Phê duyệt phương án giải quyết", desc: "Trưởng phòng/Giám đốc nhấn Duyệt để chính thức đưa phương án khắc phục vào thực thi.", source: "Tài liệu nghiệp vụ TQC - Mục 4.8.1", priority: "High", module: "Quản lý phê duyệt" },
          { id: "FR43", name: "Từ chối phê duyệt phương án kèm lý do", desc: "Cấp quản lý từ chối và ghi chú rõ lý do từ chối để nhân viên biết hướng sửa đổi.", source: "Tài liệu nghiệp vụ TQC - Mục 4.8.2", priority: "High", module: "Quản lý phê duyệt" },
          { id: "FR44", name: "Ủy quyền phê duyệt tạm thời", desc: "Cho phép Giám đốc duyện đơn cho Trưởng phòng khi đi công tác xa.", source: "Tài liệu nghiệp vụ TQC - Mục 4.8.3", priority: "Medium", module: "Quản lý phê duyệt" },
          { id: "FR45", name: "Phê duyệt gia hạn thời gian xử lý", desc: "Giám đốc xem xét duyệt thời hạn ngoại lệ cho những vụ việc có tính chất kỹ thuật phức tạp.", source: "Tài liệu nghiệp vụ TQC - Mục 4.8.3", priority: "Medium", module: "Quản lý phê duyệt" },
          { id: "FR46", name: "Ghi nhận nhật ký phê duyệt (Audit Trail)", desc: "Hệ thống ghi nhận chi tiết tài khoản duyệt, thời gian và nội dung phê duyệt không thể tẩy xóa.", source: "Tài liệu nghiệp vụ TQC - Mục 4.8.4", priority: "High", module: "Quản lý phê duyệt" },
          { id: "FR47", name: "Hủy bỏ phê duyệt khi có sai sót", desc: "Cho phép cấp quản lý thu hồi quyết định phê duyệt nếu phát hiện thông tin sai lệch trước khi gửi khách hàng.", source: "Tài liệu nghiệp vụ TQC - Mục 4.8.5", priority: "Low", module: "Quản lý phê duyệt" },

          // FR48 - FR51: Quản lý hồ sơ lưu trữ
          { id: "FR48", name: "Lưu trữ tự động hồ sơ khiếu nại đã đóng", desc: "Đóng gói toàn bộ thông tin đơn, tài liệu đính kèm, phương án và lịch sử phê duyệt thành file lưu trữ.", source: "Tài liệu nghiệp vụ TQC - Mục 4.9.1", priority: "High", module: "Quản lý hồ sơ lưu trữ" },
          { id: "FR49", name: "Tìm kiếm nhanh hồ sơ trong kho lưu trữ", desc: "Hỗ trợ nhân viên tra cứu lại các vụ việc khiếu nại cũ dựa vào mã hồ sơ hoặc tên khách hàng.", source: "Tài liệu nghiệp vụ TQC - Mục 4.9.1", priority: "Medium", module: "Quản lý hồ sơ lưu trữ" },
          { id: "FR50", name: "Xuất dữ liệu hồ sơ ra file PDF mẫu", desc: "Cho phép xuất toàn bộ tiến trình xử lý khiếu nại của một hồ sơ ra file PDF theo định dạng mẫu của TQC.", source: "Tài liệu nghiệp vụ TQC - Mục 4.9.2", priority: "Medium", module: "Quản lý hồ sơ lưu trữ" },
          { id: "FR51", name: "Đánh dấu hồ sơ mật/hồ sơ nội bộ", desc: "Gán nhãn bảo mật cho những hồ sơ tranh chấp nghiêm trọng để giới hạn quyền tiếp cận đối với nhân viên thường.", source: "Tài liệu nghiệp vụ TQC - Mục 4.9.3", priority: "Low", module: "Quản lý hồ sơ lưu trữ" },

          // FR52 - FR57: Đăng ký
          { id: "FR52", name: "Đăng ký bằng email cá nhân", desc: "Khách hàng sử dụng địa chỉ email cá nhân để tạo tài khoản mới trên hệ thống.", source: "Tài liệu nghiệp vụ TQC - Mục 4.10.1", priority: "High", module: "Đăng ký" },
          { id: "FR53", name: "Đăng ký bằng mã số thuế doanh nghiệp", desc: "Hỗ trợ khách hàng doanh nghiệp đăng ký bằng Mã số thuế để tự động đồng bộ thông tin pháp nhân.", source: "Tài liệu nghiệp vụ TQC - Mục 4.10.1", priority: "Medium", module: "Đăng ký" },
          { id: "FR54", name: "Kiểm tra độ mạnh của mật khẩu đăng ký", desc: "Hệ thống bắt buộc mật khẩu phải chứa ít nhất 8 ký tự, bao gồm chữ hoa, chữ thường, số và ký tự đặc biệt.", source: "Tài liệu nghiệp vụ TQC - Mục 4.10.2", priority: "Medium", module: "Đăng ký" },
          { id: "FR55", name: "Xác thực tài khoản qua OTP email", desc: "Gửi mã số OTP gồm 6 chữ số tới email đăng ký của người dùng để kích hoạt tài khoản.", source: "Tài liệu nghiệp vụ TQC - Mục 4.10.3", priority: "High", module: "Đăng ký" },
          { id: "FR56", name: "Đồng ý điều khoản sử dụng dịch vụ", desc: "Yêu cầu người dùng tích chọn đồng ý với chính sách bảo mật và điều khoản dịch vụ của TQC Global trước khi nhấn Đăng ký.", source: "Tài liệu nghiệp vụ TQC - Mục 4.10.4", priority: "High", module: "Đăng ký" },
          { id: "FR57", name: "Tự động khởi tạo cấu hình hồ sơ mặc định", desc: "Sau khi đăng ký thành công, hệ thống tự động tạo các trường dữ liệu hồ sơ cá nhân trống để khách hàng bổ sung sau.", source: "Tài liệu nghiệp vụ TQC - Mục 4.10.5", priority: "Low", module: "Đăng ký" },

          // FR58 - FR63: Đăng nhập
          { id: "FR58", name: "Đăng nhập bằng Tên đăng nhập và Mật khẩu", desc: "Xác thực danh tính người dùng bằng cặp tài khoản mật khẩu thông thường.", source: "Tài liệu nghiệp vụ TQC - Mục 4.11.1", priority: "High", module: "Đăng nhập" },
          { id: "FR59", name: "Yêu cầu xác thực 2 lớp (2FA)", desc: "Kích hoạt bảo mật 2 lớp qua ứng dụng Authenticator hoặc SMS đối với tài khoản quản lý và giám đốc.", source: "Tài liệu nghiệp vụ TQC - Mục 4.11.2", priority: "High", module: "Đăng nhập" },
          { id: "FR60", name: "Khôi phục mật khẩu qua Email", desc: "Khách hàng nhấn 'Quên mật khẩu' để nhận link thay đổi mật khẩu mới gửi trực tiếp về email đã đăng ký.", source: "Tài liệu nghiệp vụ TQC - Mục 4.11.3", priority: "High", module: "Đăng nhập" },
          { id: "FR61", name: "Khóa tài khoản khi đăng nhập sai quá số lần", desc: "Tự động khóa tài khoản trong 15 phút nếu người dùng nhập sai mật khẩu liên tiếp quá 5 lần.", source: "Tài liệu nghiệp vụ TQC - Mục 4.11.4", priority: "High", module: "Đăng nhập" },
          { id: "FR62", name: "Ghi nhận nhật ký đăng nhập hệ thống", desc: "Lưu trữ lịch sử thời gian, địa chỉ IP và thiết bị của mọi lượt đăng nhập để phục vụ công tác rà soát an ninh.", source: "Tài liệu nghiệp vụ TQC - Mục 4.11.5", priority: "Medium", module: "Đăng nhập" },
          { id: "FR63", name: "Tự động đăng xuất phiên làm việc", desc: "Tự động hủy phiên làm việc và đăng xuất tài khoản khi người dùng không có thao tác gì trên hệ thống trong vòng 30 phút.", source: "Tài liệu nghiệp vụ TQC - Mục 4.11.5", priority: "Medium", module: "Đăng nhập" },

          // FR64 - FR69: Phân bổ bổ sung cho Quản lý hồ sơ lưu trữ & Báo cáo
          { id: "FR64", name: "Báo cáo thống kê số lượng khiếu nại theo thời gian", desc: "Kết xuất biểu đồ và số liệu tổng hợp lượng đơn khiếu nại phát sinh theo từng tuần, tháng, quý.", source: "Tài liệu nghiệp vụ TQC - Mục 4.12.1", priority: "High", module: "Quản lý hồ sơ lưu trữ" },
          { id: "FR65", name: "Thống kê hiệu suất giải quyết đơn của nhân viên", desc: "Đo lường thời gian trung bình xử lý đơn và tỷ lệ đơn hoàn thành đúng hạn của từng cá nhân phụ trách.", source: "Tài liệu nghiệp vụ TQC - Mục 4.12.1", priority: "Medium", module: "Quản lý hồ sơ lưu trữ" },
          { id: "FR66", name: "Báo cáo tỷ lệ hài lòng của khách hàng", desc: "Phân tích số liệu đánh giá sao và phản hồi của khách hàng để đánh giá chất lượng phục vụ của trung tâm.", source: "Tài liệu nghiệp vụ TQC - Mục 4.12.2", priority: "High", module: "Quản lý hồ sơ lưu trữ" },
          { id: "FR67", name: "Xuất file excel tổng hợp khiếu nại phàn nàn", desc: "Cho phép quản lý tải về file Excel chứa toàn bộ danh sách khiếu nại cùng các trường dữ liệu liên quan để báo cáo nội bộ.", source: "Tài liệu nghiệp vụ TQC - Mục 4.12.3", priority: "High", module: "Quản lý hồ sơ lưu trữ" },
          { id: "FR68", name: "Phân tích xu hướng khiếu nại dịch vụ", desc: "Hệ thống phân tích từ khóa và danh mục để đưa ra cảnh báo về khâu dịch vụ nào đang bị phàn nàn nhiều nhất.", source: "Tài liệu nghiệp vụ TQC - Mục 4.12.4", priority: "Low", module: "Quản lý hồ sơ lưu trữ" },
          { id: "FR69", name: "Lưu cấu hình bộ lọc báo cáo tùy chỉnh", desc: "Cho phép người dùng lưu lại các điều kiện lọc báo cáo phức tạp để sử dụng nhanh cho những lần sau.", source: "Tài liệu nghiệp vụ TQC - Mục 4.12.5", priority: "Low", module: "Quản lý hồ sơ lưu trữ" },

          // FR70 - FR74: Phân bổ bổ sung cho Quản lý nhân sự & Hệ thống

        function PdfRenderer({ pdfDoc, pageNum, pdfLoading, pdfError, label }) {
          const canvasRef = useRef(null);
          const [renderLoading, setRenderLoading] = useState(false);
          const [pageError, setPageError] = useState(false);
          
          // Trạng thái phóng to thu nhỏ cục bộ cho từng sơ đồ (Mặc định: 100%)
          const [zoom, setZoom] = useState(1.0);

          useEffect(() => {
            if (!pdfDoc) return;
            let renderTask = null;
            
            const renderPage = async () => {
              try {
                setRenderLoading(true);
                setPageError(false);
                const page = await pdfDoc.getPage(pageNum);
                
                // Lấy kích thước khung chứa hiện tại
                const containerWidth = canvasRef.current?.parentNode?.parentNode?.clientWidth || 800;
                const standardViewport = page.getViewport({ scale: 1.0 });
                
                // Tỉ lệ scale cơ sở để vừa khít chiều rộng khung chứa
                const baseScale = (containerWidth - 32) / standardViewport.width;
                
                // Tỉ lệ thực tế = Tỉ lệ cơ sở * Chỉ số Zoom do người dùng cấu hình
                // PDF.js sẽ vẽ lại (re-render) trực tiếp trên canvas theo tỷ lệ mới để giữ nét chữ vector sắc nét
                const finalScale = baseScale * zoom;
                
                const viewport = page.getViewport({ scale: finalScale });
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                  canvasContext: context,
                  viewport: viewport
                };
                renderTask = page.render(renderContext);
                await renderTask.promise;
              } catch (err) {
                console.error("PDF page render error: ", err);
                setPageError(true);
              } finally {
                setRenderLoading(false);
              }
            };

            renderPage();

            // Lắng nghe sự kiện thay đổi kích thước cửa sổ để tự động vẽ lại
            const handleResize = () => {
              renderPage();
            };
            window.addEventListener('resize', handleResize);

            return () => {
              if (renderTask) {
                renderTask.cancel();
              }
              window.removeEventListener('resize', handleResize);
            };
          }, [pdfDoc, pageNum, zoom]); // Vẽ lại bất cứ khi nào tỉ lệ Zoom thay đổi

          const handleZoomIn = () => {
            setZoom(prev => Math.min(prev + 0.15, 3.5)); // Giới hạn phóng to tối đa 350% để tránh quá tải bộ nhớ nhưng vẫn siêu nét
          };

          const handleZoomOut = () => {
            setZoom(prev => Math.max(prev - 0.15, 0.5)); // Giới hạn thu nhỏ tối thiểu 50%
          };

          const handleZoomReset = () => {
            setZoom(1.0); // Quay về tỉ lệ khít màn hình ban đầu (100%)
          };

          const isLoading = pdfLoading || renderLoading;

          return (
            <div className="relative border border-slate-200 rounded-2xl overflow-hidden bg-slate-100 flex flex-col shadow-sm">
              
              {/* THANH ĐIỀU KHIỂN THU PHÓNG THÔNG MINH (VECTOR ZOOM BAR) */}
              {pdfDoc && (
                <div className="bg-white border-b border-slate-200 px-4 py-2.5 flex flex-wrap items-center justify-between gap-3 text-xs z-10">
                  <div className="flex items-center space-x-2">
                    <span className="font-semibold text-slate-500">Tỉ lệ hiển thị:</span>
                    <span className="bg-indigo-50 text-indigo-700 px-2.5 py-1 rounded-md font-bold font-mono border border-indigo-100 min-w-[55px] text-center">
                      {Math.round(zoom * 100)}%
                    </span>
                  </div>
                  
                  {/* Các nút tương tác Phóng to / Thu nhỏ */}
                  <div className="flex items-center space-x-1.5">
                    <button
                      onClick={handleZoomOut}
                      title="Thu nhỏ sơ đồ"
                      className="bg-slate-100 hover:bg-slate-200 text-slate-700 hover:text-slate-900 font-bold p-1.5 rounded-lg border border-slate-200 transition-all flex items-center justify-center shadow-sm"
                    >
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M20 12H4" />
                      </svg>
                    </button>
                    
                    <button
                      onClick={handleZoomReset}
                      title="Đặt lại về mặc định"
                      className="bg-slate-100 hover:bg-indigo-600 text-slate-700 hover:text-white font-bold px-3 py-1.5 rounded-lg border border-slate-200 hover:border-indigo-600 transition-all shadow-sm font-semibold"
                    >
                      Đặt lại (100%)
                    </button>
                    
                    <button
                      onClick={handleZoomIn}
                      title="Phóng to sắc nét"
                      className="bg-slate-100 hover:bg-slate-200 text-slate-700 hover:text-slate-900 font-bold p-1.5 rounded-lg border border-slate-200 transition-all flex items-center justify-center shadow-sm"
                    >
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4v16m8-8H4" />
                      </svg>
                    </button>
                  </div>

                  <div className="text-[11px] text-slate-400 font-medium hidden sm:inline">
                    💡 <span className="italic">Kéo thanh cuộn để dịch chuyển vùng xem khi phóng to.</span>
                  </div>
                </div>
              )}

              {/* KHUNG CHỨA CANVAS VỚI THANH CUỘN TỰ ĐỘNG */}
              <div className="p-4 flex flex-col items-center justify-center min-h-[300px] sm:min-h-[500px] bg-slate-100/50 shadow-inner overflow-auto max-w-full">
                
                {!pdfDoc && !isLoading && (
                  <div className="my-auto flex flex-col items-center justify-center text-center p-6 space-y-4 bg-slate-50 rounded-2xl border border-slate-200/60 max-w-md">
                    <div className="bg-amber-100 p-4 rounded-full text-amber-600 shadow-sm">
                      <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                      </svg>
                    </div>
                    <div>
                      <h4 className="text-sm font-bold text-slate-800">Cần nạp tài liệu PDF gốc</h4>
                      <p className="text-xs text-slate-500 mt-1 font-semibold leading-relaxed">
                        Sơ đồ gốc của <strong>"{label}"</strong> chỉ hiển thị tự động khi bạn tải tệp PDF thuyết trình gốc ở thanh công cụ phía trên.
                      </p>
                    </div>
                    <div className="text-xs bg-slate-200 text-slate-600 font-mono py-1 px-3 rounded-full border border-slate-300">
                      [Mục tiêu hiển thị: Trang {pageNum} của tài liệu]
                    </div>
                  </div>
                )}

                {isLoading && (
                  <div className="absolute inset-0 bg-slate-50/90 backdrop-blur-sm flex flex-col items-center justify-center z-10 space-y-3">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                    <span className="text-xs text-slate-600 font-bold">Đang tái dựng Vector chất lượng cao trang {pageNum}...</span>
                  </div>
                )}

                {pdfDoc && !pageError && (
                  <div className="max-w-full flex justify-center bg-white p-2 rounded-xl border border-slate-200/80 shadow-md">
                    <canvas ref={canvasRef} className="max-w-full h-auto transition-all duration-100" />
                  </div>
                )}

                {pageError && (
                  <div className="text-center p-6 text-red-600 space-y-2">
                    <span className="text-2xl">⚠️</span>
                    <p className="text-xs font-bold">Lỗi không thể kết xuất trang {pageNum} trong tài liệu này.</p>
                    <p className="text-[10px] text-slate-500 font-semibold">Hãy đảm bảo bạn đã tải đúng tệp tin PDF thuyết trình gốc.</p>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
